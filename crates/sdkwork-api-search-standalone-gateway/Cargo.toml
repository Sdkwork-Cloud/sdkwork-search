sdkwork-web-axum = { workspace = true }
sdkwork-web-contract = { workspace = true }
sdkwork-search-database-host = { workspace = true }
sdkwork-search-provider-spi = { workspace = true }
sdkwork-search-provider-memory = { workspace = true }
sdkwork-search-provider-postgresql = { workspace = true }
sdkwork-search-indexing-repository-sqlx = { workspace = true }
sdkwork-search-indexing-service = { workspace = true }
sdkwork-search-query-service = { workspace = true }
sdkwork-search-recommendation-service = { workspace = true }
sdkwork-search-promotion-service = { workspace = true }
sdkwork-drive-uploader-service = { workspace = true }
sdkwork-drive-workspace-service = { workspace = true }
sdkwork-drive-storage-contract = { workspace = true }
sdkwork-drive-storage-local = { workspace = true }
sdkwork-utils-rust = { workspace = true }
sdkwork_api_search_assembly.workspace = true
axum = { workspace = true, features = ["multipart"] }
tokio = { workspace = true }
tower.workspace = true
serde = { workspace = true }
serde_json.workspace = true
tracing.workspace = true
sqlx.workspace = true
anyhow.workspace = true
