[package]
name = "sdkwork-api-search-standalone-gateway"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP API server process for SDKWork Search."

[lib]
path = "src/lib.rs"

[[bin]]
name = "sdkwork-api-search-standalone-gateway"
path = "src/main.rs"

[dependencies]
sdkwork-web-bootstrap = { workspace = true, features = ["sqlx"] }
