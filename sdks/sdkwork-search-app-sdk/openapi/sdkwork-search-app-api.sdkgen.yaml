    "/app/v3/api/search/suggestions": {
      "get": {
        "tags": [
          "search"
        ],
        "summary": "List search suggestions for app clients.",
        "operationId": "search.suggestions.list",
        "parameters": [
          {
            "name": "q",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
