          },
          {
            "name": "provider_id",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string"
            },
            "description": "Optional search provider id for provider-routed suggestions."
          },
          {
            "name": "provider_kind",
            "in": "query",
            "required": false,
            "schema": {
              "type": "string",
              "enum": [
                "algolia",
                "custom",
                "elasticsearch",
                "meilisearch",
                "memory",
                "opensearch",
                "postgresql",
                "typesense",
                "vector"
              ]
            },
            "description": "Optional search provider kind for provider-routed suggestions."
          },
          {
            "name": "capability_ids",
            "in": "query",
            "required": false,
            "schema": {
              "type": "array",
